<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Удаление профиля</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .drop-container {
            background: white;
            max-width: 400px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 { color: #dc3545; }
        p { line-height: 1.6; color: #555; }
        .btn-danger {
            background: #dc3545;
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="drop-container">
        <h2>Удаление профиля</h2>
        <p>Вы собираетесь полностью удалить свой профиль в тренажёре «Кураж Продаж».</p>
        <p><strong>Это действие необратимо.</strong><br>Все данные и прогресс будут удалены!</p>
        
        <button id="confirm-delete-btn" class="btn-danger">Да, удалить профиль</button>
        <br>
        <button onclick="history.back()" class="btn-secondary">Отмена</button>
    </div>

    <!-- СТИЛИЗОВАННЫЙ ALERT / CONFIRM -->
    <div id="styled-alert-overlay" class="hidden">
        <div class="explanation-popup" style="max-width: 340px; padding: 28px 24px;">
            <p id="styled-alert-text" style="font-size: 1.1em; line-height: 1.45; margin: 0 0 24px 0; color: #1C1C28;"></p>
        </div>
    </div>

    <script>
        // ==================== СТИЛИЗОВАННЫЙ ALERT ====================
        function showStyledAlert(message, callback = null) {
            const overlay = document.getElementById('styled-alert-overlay');
            const popup   = overlay.querySelector('.explanation-popup');
            const textEl  = document.getElementById('styled-alert-text');

            textEl.innerHTML = message;           // поддержка эмодзи и <br>
            overlay.classList.remove('hidden');

            // Удаляем старые кнопки
            popup.querySelectorAll('button').forEach(btn => btn.remove());

            const okBtn = document.createElement('button');
            okBtn.textContent = 'Понятно';
            okBtn.className = 'promo-action-btn btn-green';   // зелёная кнопка для успеха
            okBtn.style.marginTop = '10px';

            okBtn.onclick = () => {
                overlay.classList.add('hidden');
                if (callback) callback();
            };

            popup.appendChild(okBtn);
        }

        // ==================== СТИЛИЗОВАННЫЙ CONFIRM ====================
        function showStyledConfirm(message, onYes, onNo = null) {
            const overlay = document.getElementById('styled-alert-overlay');
            const popup   = overlay.querySelector('.explanation-popup');
            const textEl  = document.getElementById('styled-alert-text');

            textEl.textContent = message;
            overlay.classList.remove('hidden');

            popup.querySelectorAll('button').forEach(btn => btn.remove());

            const yesBtn = document.createElement('button');
            yesBtn.textContent = 'Да, удалить';
            yesBtn.className = 'promo-action-btn btn-danger';
            yesBtn.style.marginBottom = '12px';

            const noBtn = document.createElement('button');
            noBtn.textContent = 'Отмена';
            noBtn.className = 'promo-action-btn btn-blue';

            const close = () => overlay.classList.add('hidden');

            yesBtn.onclick = () => { close(); if (onYes) onYes(); };
            noBtn.onclick  = () => { close(); if (onNo) onNo(); };

            popup.appendChild(yesBtn);
            popup.appendChild(noBtn);
        }

        // ==================== ОБРАБОТЧИК УДАЛЕНИЯ ====================
        document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
            
            showStyledConfirm(
                'Последнее подтверждение:\n\nВы уверены, что хотите УДАЛИТЬ профиль НАВСЕГДА?',
                async () => {
                    const userId = localStorage.getItem('userId');

                    if (!userId) {
                        showStyledAlert('Ошибка: ID пользователя не найден.<br>Перелогиньтесь в приложение.');
                        return;
                    }

                    try {
                        const res = await fetch('/api/user/delete-profile', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ userId: parseInt(userId) })
                        });

                        const data = await res.json();

                        if (res.ok && data.success) {
                            // ← КРАСИВОЕ УВЕДОМЛЕНИЕ ВМЕСТО ALERT
                            showStyledAlert(
                                '✅ <strong>Профиль успешно удалён.</strong><br><br>Все данные и прогресс стёрты.',
                                () => {
                                    localStorage.clear();
                                    window.location.href = '/index.html';
                                }
                            );
                        } else {
                            showStyledAlert('❌ ' + (data.error || 'Не удалось удалить профиль'));
                        }
                    } catch (err) {
                        console.error(err);
                        showStyledAlert('❌ Ошибка соединения с сервером');
                    }
                }
            );
        });
    </script>
</body>
</html>
