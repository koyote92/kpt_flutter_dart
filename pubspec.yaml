name: webview_app
description: "Кураж Продаж Тренажёр"
version: 1.0.1+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  url_launcher: ^6.3.0
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.2.0
  flutter_launcher_icons: ^0.14.4
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/web/
    - assets/web/bootstrap/css/
    - assets/web/bootstrap/js/
    - assets/web/img/
    - assets/web/icons/
    - assets/web/webfonts/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon_3_512.png"